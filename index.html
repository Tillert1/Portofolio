<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davin Ramadhan - The Doctor's IT Lab</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Compiler (Supaya browser bisa membaca sintaks HTML/JSX langsung tanpa eror) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-white overflow-x-hidden font-sans selection:bg-yellow-400 selection:text-blue-900">

    <div id="root"></div>

    <!-- Perhatikan type="text/babel" di bawah ini, wajib ada agar script dieksekusi dengan benar -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "CONTOH_API_KEY",
            authDomain: "portfolio-anda.firebaseapp.com",
            projectId: "portfolio-anda",
            storageBucket: "portfolio-anda.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:1234:web:abcd"
        };

        // Inisialisasi aman untuk browser
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'davin-vr46-v4';

        // Komponen Pembantu Render Ikon Lucide secara Real-time
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [user, setUser] = useState(null);
          const [notes, setNotes] = useState([]);
          const [newNote, setNewNote] = useState({ name: '', content: '' });
          const [isSubmitting, setIsSubmitting] = useState(false);

          const colors = {
            rossiYellow: '#D6FF00',
            rossiBlue: '#002B5B',
            rossiDark: '#050B14',
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                  await auth.signInAnonymously();
                }
              } catch (err) { console.error("Auth error:", err); }
            };
            initAuth();
            const unsubscribe = auth.onAuthStateChanged(setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const notesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('pit_notes');
            const unsubscribe = notesRef.onSnapshot((snapshot) => {
              const data = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
              })).sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
              setNotes(data);
            }, (error) => console.error("Firestore error:", error));
            return () => unsubscribe();
          }, [user]);

          const handleSubmitNote = async (e) => {
            e.preventDefault();
            if (!user || !newNote.name || !newNote.content) return;
            setIsSubmitting(true);
            try {
              const notesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('pit_notes');
              await notesRef.add({
                name: newNote.name,
                content: newNote.content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                userId: user.uid
              });
              setNewNote({ name: '', content: '' });
            } catch (err) { console.error("Error:", err); } finally { setIsSubmitting(false); }
          };

          const skillDetails = [
            { title: 'Cisco Networking', icon: 'network', desc: 'Mastering the line.', detail: 'Ahli dalam konfigurasi Routing & Switching menggunakan perangkat Cisco. Fokus pada segmentasi VLAN, keamanan port, dan optimasi jalur data untuk memastikan network latency tetap rendah, layaknya memilih racing line yang sempurna di sirkuit.' },
            { title: 'Hardware Restoration', icon: 'wrench', desc: 'Engine rebuild expert.', detail: 'Spesialis dalam diagnosa kerusakan hardware, perakitan PC high-end, hingga penggantian komponen kritis. Mengutamakan airflow dan manajemen suhu agar sistem tetap stabil meski dipaksa bekerja pada limit tertinggi (overclocking/heavy load).' },
            { title: 'System Optimization', icon: 'cpu', desc: 'Tuning for performance.', detail: 'Optimasi Sistem Operasi (Windows/Linux) melalui manajemen registry, debloating, dan alokasi resource yang efisien. Menjamin performa software berjalan mulus tanpa bottleneck, serupa dengan fine-tuning ECU pada motor balap.' },
            { title: 'Physical Infrastructure', icon: 'pen-tool', desc: 'Seamless connectivity.', detail: 'Terampil dalam instalasi kabel UTP/STP dengan standar terminasi tinggi (TIA/EIA). Memastikan integritas fisik jaringan tetap terjaga dari interferensi sinyal, memberikan jaminan koneksi yang andal untuk transmisi data skala besar.' }
          ];

          return (
            <div className="min-h-screen text-white overflow-x-hidden bg-slate-950 font-sans selection:bg-yellow-400 selection:text-blue-900">
              
              {/* Background Decor */}
              <div className="fixed inset-0 opacity-10 pointer-events-none z-0" style={{ backgroundImage: `url('https://www.transparenttextures.com/patterns/carbon-fibre.png')` }}></div>
              <div className="fixed -right-16 top-40 text-[20rem] font-black italic opacity-5 pointer-events-none select-none z-0">46</div>

              {/* Nav */}
              <nav className="fixed top-0 w-full z-50 border-b-4 border-yellow-400 bg-blue-900/95 backdrop-blur-md">
                <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                  <div className="flex items-center gap-1">
                    <span className="text-4xl font-black italic tracking-tighter" style={{ color: colors.rossiYellow }}>
                      DR<span className="text-white">46</span>
                    </span>
                  </div>
                  <div className="hidden md:flex gap-8">
                    {['home', 'skills', 'notes'].map(id => (
                      <button key={id} onClick={() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' })} 
                        className="text-xs font-black uppercase tracking-widest hover:text-yellow-400 transition-colors italic">
                        {id}
                      </button>
                    ))}
                  </div>
                  <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                    {isMenuOpen ? <Icon name="x" size={30} /> : <Icon name="menu" size={30} className="text-[#D6FF00]" />}
                  </button>
                </div>
                {isMenuOpen && (
                  <div className="md:hidden bg-blue-950 border-t border-yellow-400 p-4 flex flex-col gap-4">
                    {['home', 'skills', 'notes'].map(id => (
                      <button key={id} onClick={() => { setIsMenuOpen(false); document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); }} 
                        className="text-left text-sm font-black uppercase tracking-wider py-2 text-white hover:text-yellow-400 italic">
                        {id}
                      </button>
                    ))}
                  </div>
                )}
              </nav>

              {/* Hero */}
              <section id="home" className="relative pt-48 pb-20 px-6 min-h-screen flex items-center justify-center">
                <Icon name="sun" className="absolute top-40 left-10 w-64 h-64 text-yellow-400/10 animate-spin-slow" />
                <Icon name="moon" className="absolute bottom-20 right-10 w-64 h-64 text-blue-400/10" />
                <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center z-10">
                  <div className="text-center md:text-left">
                    <div className="inline-flex items-center gap-2 px-4 py-1.5 mb-6 bg-yellow-400 text-blue-900 font-black italic skew-x-[-15deg] shadow-[4px_4px_0px_#fff]">
                      <Icon name="zap" size={18} className="fill-current" /> THE DOCTOR'S IT LAB
                    </div>
                    <h1 className="text-7xl md:text-9xl font-black italic leading-[0.8] mb-8 tracking-tighter uppercase">
                      DAVIN <br />
                      <span className="text-yellow-400">RAMADHAN</span>
                    </h1>
                    <p className="text-xl text-gray-400 italic mb-10 max-w-xl border-l-8 border-yellow-400 pl-6 leading-relaxed">
                      Profesional IT Support yang menggabungkan presisi mekanik MotoGP dengan ketangguhan infrastruktur jaringan digital.
                    </p>
                    <button onClick={() => document.getElementById('notes').scrollIntoView({behavior: 'smooth'})} 
                      className="px-12 py-5 bg-yellow-400 text-blue-900 font-black italic text-xl skew-x-[-12deg] hover:scale-105 transition-all shadow-[8px_8px_0px_#002B5B]">
                      MASUK PIT!
                    </button>
                  </div>
                  <div className="hidden md:flex justify-center">
                     <div className="w-96 h-96 bg-blue-900 rounded-full border-[15px] border-yellow-400 flex flex-col items-center justify-center shadow-2xl relative animate-float">
                        <Icon name="sun" className="text-yellow-400 w-24 h-24 absolute top-10 left-10 opacity-30" />
                        <h3 className="text-9xl font-black italic text-white leading-none">46</h3>
                        <Icon name="moon" className="text-blue-300 w-20 h-20 absolute bottom-10 right-10 opacity-30" />
                     </div>
                  </div>
                </div>
              </section>

              {/* Gearbox Section */}
              <section id="skills" className="py-32 px-6 bg-black/50 relative border-y border-white/5">
                <div className="max-w-7xl mx-auto">
                  <div className="flex flex-col items-start mb-20">
                    <div className="flex items-center gap-4 mb-4">
                      <div className="h-12 w-3 bg-yellow-400 skew-x-[-15deg]"></div>
                      <h2 className="text-5xl md:text-7xl font-black italic uppercase tracking-tighter">GEAR<span className="text-yellow-400">BOX</span></h2>
                    </div>
                    <p className="text-gray-500 font-bold uppercase tracking-[0.4em] text-sm">Spesifikasi Teknis & Keahlian</p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    {skillDetails.map((skill, index) => (
                      <div key={index} className="group p-10 bg-white/5 border-l-8 border-yellow-400 hover:bg-yellow-400/5 transition-all skew-x-[-2deg]">
                        <div className="flex flex-col md:flex-row gap-8 items-start">
                          <div className="p-4 bg-yellow-400/10 text-yellow-400 rounded-2xl group-hover:bg-yellow-400 group-hover:text-blue-900 transition-colors">
                            <Icon name={skill.icon} size={40} />
                          </div>
                          <div className="flex-1">
                            <h3 className="text-3xl font-black italic mb-1 uppercase tracking-tighter text-white">{skill.title}</h3>
                            <p className="text-yellow-400 font-black italic text-xs uppercase tracking-widest mb-4 opacity-70">{skill.desc}</p>
                            <p className="text-gray-400 font-medium leading-relaxed italic text-base border-t border-white/10 pt-4">
                              {skill.detail}
                            </p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              {/* Pit Notes */}
              <section id="notes" className="py-32 px-6 bg-yellow-400 text-blue-900">
                <div className="max-w-4xl mx-auto">
                  <div className="text-center mb-16">
                    <h2 className="text-7xl font-black italic tracking-tighter uppercase leading-none">PIT NOTES</h2>
                    <p className="font-black italic uppercase tracking-widest mt-2">Berikan saran atau ajak kolaborasi</p>
                  </div>

                  <div className="bg-blue-900 p-10 shadow-[20px_20px_0px_rgba(0,0,0,0.3)] border-4 border-white mb-16">
                    <form onSubmit={handleSubmitNote} className="space-y-8">
                      <div className="space-y-2 text-left">
                        <label className="text-lg font-black italic text-yellow-400 uppercase">Nickname</label>
                        <input type="text" className="w-full bg-white text-blue-900 font-bold p-5 outline-none" value={newNote.name} onChange={(e) => setNewNote({...newNote, name: e.target.value})} required placeholder="Contoh: Sang Rival" />
                      </div>
                      <div className="space-y-2 text-left">
                        <label className="text-lg font-black italic text-yellow-400 uppercase">Message</label>
                        <textarea rows="3" className="w-full bg-white text-blue-900 font-bold p-5 outline-none" value={newNote.content} onChange={(e) => setNewNote({...newNote, content: e.target.value})} required placeholder="Tinggalkan pesan Anda..." />
                      </div>
                      <button type="submit" disabled={isSubmitting} className="w-full py-6 bg-yellow-400 text-blue-900 font-black italic text-2xl hover:bg-white transition-all disabled:opacity-50">
                        {isSubmitting ? "TRANSMITTING..." : "KIRIM KE PADDOCK"}
                      </button>
                    </form>
                  </div>

                  <div className="space-y-6">
                    {notes.map((n) => (
                      <div key={n.id} className="p-8 bg-blue-950 text-white border-l-[12px] border-blue-900 shadow-xl text-left">
                        <div className="flex justify-between items-center mb-4">
                          <span className="text-xl font-black italic text-yellow-400 uppercase flex items-center gap-2">
                            <Icon name="user" size={18}/> {n.name}
                          </span>
                          <span className="text-[10px] font-bold text-white/40 italic">
                            {n.createdAt?.seconds ? new Date(n.createdAt.seconds * 1000).toLocaleDateString() : 'Baru saja'}
                          </span>
                        </div>
                        <p className="text-lg italic opacity-80">"{n.content}"</p>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              {/* Footer / Roast */}
              <footer className="py-40 px-6 bg-black text-center relative overflow-hidden">
                <div className="max-w-4xl mx-auto relative z-10">
                  <div className="mb-24">
                    <div className="inline-flex items-center gap-2 text-red-500 font-black italic uppercase tracking-[0.2em] mb-6 border-b border-red-500/20 pb-2">
                       <Icon name="info" size={16} /> THE LEGENDARY ROAST (JEREZ 2011)
                    </div>
                    <blockquote className="text-4xl md:text-6xl font-black italic text-white leading-[0.9] uppercase tracking-tighter mb-8">
                      "YOUR AMBITION OUTWEIGHS <br />
                      <span className="text-yellow-400">YOUR TALENT</span>."
                    </blockquote>
                    <cite className="text-2xl font-black not-italic tracking-[0.3em] uppercase text-red-600 block mb-4">
                      — Casey Stoner
                    </cite>
                    <p className="text-gray-500 text-[11px] font-bold uppercase max-w-md mx-auto leading-relaxed italic opacity-70">
                      Ujaran ini dilemparkan Stoner ke Rossi setelah insiden tabrakan di Jerez. 
                      Sebagai bukti bahwa dalam dunia IT pun, kita butuh bakat yang sebanding 
                      dengan ambisi besar untuk mencapai puncak.
                    </p>
                  </div>

                  <p className="text-[10px] text-gray-800 font-black uppercase tracking-[1em] mt-20">
                    Davin Ramadhan • VR46 Edition • 2026
                  </p>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        html { scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D6FF00; }
    </style>
</body>
</html>
